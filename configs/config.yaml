train_id: no_test
load_checkpoint: None

# dataset
rootdir: ./dataset
dataset: Glasgow
feature_type: v_heatmap
domain: folder # key to extract domain from .h5 file
num_classes: 6
num_train_domains: 6
num_domains: 7
val_dom: None
test_dom: None
train_split: 0.85

# train:
batch_size: 32
num_steps: 800
val_freq: 20
ckpt_freq: 800
ckpt: None

algorithm: DANN
learning_rate: 5e-06
weight_decay: 0.1
loss_type: CrossEntropy
# DANN
DANN:
  lambd: 0.2
  loss_type_d: CrossEntropy
  nonlinear_discriminator: true
  d_steps_per_g_step: 1
# IRM


# model
featurizer: ResNet
nonlinear_classifier: true
num_inputs: 1,200,251
# MLP
mlp_num_hidden: 32
mlp_dropout: 0.1
mlp_width: 64
mlp_depth: 5
# Resnet
resnet18: true
resnet_dropout: 0.1
freeze_bn: true

