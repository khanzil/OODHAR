train_id: no1
load_checkpoint: None

# dataset
rootdir: ./dataset
dataset: Glasgow
feature_type: v_heatmap
domain: folder # key to extract domain from .h5 file
num_classes: 6
num_train_domains: 6
num_domains: 7
val_dom: None
test_dom: None

# train:
batch_size: 32
num_epochs: 100
ckpt_freq: 10
ckpt: None

algorithm: ERM
learning_rate: 5e-06
weight_decay: 0.1
loss_type: CrossEntropy
# DANN
lambd: 0.2
loss_type_d: CrossEntropy
nonlinear_discriminator: true
d_steps_per_g_step: 1

# model
featurizer: MNIST_CNN
nonlinear_classifier: true
num_inputs: 1,200,251
# MLP
mlp_num_hidden: 32
mlp_dropout: 0.1
mlp_width: 64
mlp_depth: 5
# Resnet
resnet18: true
resnet_dropout: 0.1
freeze_bn: true

